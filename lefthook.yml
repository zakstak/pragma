---
pre-commit:
  parallel: true
  commands:
    format:
      glob: "*.{go,rs,ts,tsx,js,jsx,html,htm,yml,yaml,sh,md,toml,json,py}"
      run: >
        ./lib/format.sh {staged_files}

    lint:
      glob: "*.{go,rs,ts,tsx,js,jsx,yml,yaml,sh,toml,py,dockerfile,Dockerfile}"
      run: >
        ./lib/lint.sh {staged_files}

    gitleaks:
      run: >
        gitleaks protect --staged --redact
      skip:
        - merge
        - rebase

pre-push:
  commands:
    test:
      run: >
        ./lib/test.sh
